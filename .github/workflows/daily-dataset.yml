name: Daily Dataset Update

on:
  schedule:
    # Run at 12:00 UTC (8:00 AM ET during EDT)
    - cron: '0 12 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dataset
        run: make dataset-auto

      - name: Run Review Queue Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make review-queue-agent

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/
          git diff --staged --quiet || git commit -m "Daily dataset update $(date +%Y-%m-%d)"
          git push
